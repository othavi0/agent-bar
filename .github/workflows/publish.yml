name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: write # gh release upload (anexar o binário standalone)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(jq -r .version package.json)"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$EXPECTED_TAG" != "$RELEASE_TAG" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version (expected '$EXPECTED_TAG')"
            exit 1
          fi
          echo "Version $PKG_VERSION matches release tag $RELEASE_TAG"

      - name: Release check
        run: bun run release:check

      - name: Publish to npm
        run: bun run publish:npm
        env:
          # scripts/bun-publish-with-npm-token reads NPM_CONFIG_TOKEN (not NODE_AUTH_TOKEN)
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Standalone binary for the AUR -bin package. Sequential AFTER npm publish.
      - name: Build standalone binary
        run: |
          VERSION=$(jq -r .version package.json)
          bun build --compile --target=bun-linux-x64 --minify --outfile agent-bar src/index.ts
          mkdir -p pkg/scripts pkg/icons
          cp agent-bar pkg/
          cp -r icons/. pkg/icons/
          cp scripts/agent-bar-open-terminal pkg/scripts/
          cp LICENSE pkg/
          tar czf "agent-bar-${VERSION}-x86_64.tar.gz" -C pkg .
          sha256sum "agent-bar-${VERSION}-x86_64.tar.gz" | tee "agent-bar-${VERSION}-x86_64.tar.gz.sha256"

      - name: Attach binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version package.json)
          gh release upload "v${VERSION}" \
            "agent-bar-${VERSION}-x86_64.tar.gz" \
            "agent-bar-${VERSION}-x86_64.tar.gz.sha256" \
            --clobber
